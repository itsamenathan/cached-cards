name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Set build date
        run: echo "VITE_BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify Gotify (success)
        if: ${{ success() }}
        run: |
          message=$(cat <<'EOF'
          ✅ Cached Cards deploy succeeded: ${{ steps.deployment.outputs.page_url }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Message: ${{ github.event.head_commit.message || 'workflow_dispatch' }}
          EOF
          )
          curl --fail --silent --show-error \
            -X POST "${{ secrets.GOTIFY_URL }}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
            -F "title=Cached Cards deploy succeeded" \
            -F "priority=5" \
            --form-string "message=$message"
      - name: Notify Gotify (failure)
        if: ${{ failure() }}
        run: |
          message=$(cat <<'EOF'
          ❌ Cached Cards deploy failed.
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Message: ${{ github.event.head_commit.message || 'workflow_dispatch' }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          curl --fail --silent --show-error \
            -X POST "${{ secrets.GOTIFY_URL }}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
            -F "title=Cached Cards deploy failed" \
            -F "priority=8" \
            --form-string "message=$message"
